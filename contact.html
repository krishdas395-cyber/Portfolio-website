<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="mt-4 mb-5">
        <div class="main-button">
            <nav class="nav-buttons">
                <a href="index.html" class="nav-btn">Home</a>
                <a href="contact.html" class="nav-btn" style="color: yellow;">Contact</a>
                <a href="about.html" class="nav-btn">About</a>
                <a href="resume.html" class="nav-btn">Resume</a>
                
            </nav>
        </div>
    </header>

    <section class="contact-section">
        
        <div class="text-center mb-5">
            <h1 style="font-size: 3.5rem; color: #A6A6A6;">Get In <span class="yellow">Touch</span></h1>
            <p class="text-secondary"><span><</span><span class="yellow">p</span><span>></span>Have a project in mind or want to discuss full-stack development? Let's talk.<span><</span><span>/</span><span class="yellow">p</span><span>></span></p>
        </div>

        <div class="contact-container">
            
            <div class="contact-left">
                
                <div class="info-card">
                    <span class="material-symbols-outlined yellow-icon">mail</span>
                    <div class="info-text">
                        <h4 class="text-white m-0">Email Me</h4>
                        <p class="text-secondary m-0"><span class="blue">krishdas395@gmail.com</span></p> </div>
                </div>

                <div class="info-card">
                    <span class="material-symbols-outlined yellow-icon">location_on</span>
                    <div class="info-text">
                        <h4 class="text-white m-0">Location</h4>
                        <p class="text-secondary m-0"><span class="blue">Vadodara, Gujarat, India</span></p>
                    </div>
                </div>

                <div class="info-card">
                    <span class="material-symbols-outlined yellow-icon">phone</span>
                    <div class="info-text">
                        <h4 class="text-white m-0">Call Me</h4>
                        <p class="text-secondary m-0"><span class="blue">+91 8240944803</span></p>
                    </div>
                </div>

                <div class="contact-socials mt-4">
                    <h5 class="text-white mb-3"><span class="red-line">Connect on Socials</span></h5>
                    <div class="social-icons">
                        <a href="https://www.linkedin.com/in/krish-das-516350365/"><i class="fa-brands fa-linkedin"></i></a>
                        <a href="https://github.com/krishdas395-cyber"><i class="fa-brands fa-github"></i></a>
                        <a href="https://www.instagram.com/krish_d.64/"><i class="fa-brands fa-instagram"></i></a>
                    </div> 
                </div>

            </div>

            <div class="contact-right">
                <form class="contact-form">
                    <div class="input-group">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <input type="text" placeholder="Subject" required class="full-width">
                    <textarea placeholder="Your Message..." rows="5" required class="full-width"></textarea>
                    
                    <button type="submit" class="btn-submit">
                        <span class="material-symbols-outlined align-middle me-2">send</span>
                        Send Message
                    </button>
                </form>
            </div>

        </div>
    </section>

</body>
</html>
